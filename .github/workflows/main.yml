name: ci
on:
  push:
    branches:
      - "master"
    tags:
      - '*.*.*'
permissions:
  contents: write

jobs:
  CI:
    runs-on: ubuntu-latest
    name: metrics-server-exporter
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - name: Run TruffleHog
        run: |
          docker pull dxa4481/trufflehog
          docker run -v ${{ github.workspace }}:/target dxa4481/trufflehog --entropy=False file:///target
      - name: List files in path
        run: ls -la .
      # - name: 'Qodana Scan'
      #   uses: JetBrains/qodana-action@v2023.3
      #   env:
      #     QODANA_TOKEN: ${{ secrets.QODANA_TOKEN }}
      - name: Upload Test results
        uses: actions/upload-artifact@master
        with:
           name: Depcheck report
           path: ${{github.workspace}}/reports
      - name: Set env
        run: echo "RELEASE_VERSION=${GITHUB_REF#refs/*/}" >> $GITHUB_ENV
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/metrics-server-exporter:latest, ${{ secrets.DOCKER_HUB_USERNAME }}/metrics-server-exporter:${{ env.RELEASE_VERSION }}
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_HUB_USERNAME }}/metrics-server-exporter:${{ env.RELEASE_VERSION }}
          format: 'table'
          exit-code: '0'
          severity: 'HIGH'
      - name: Run Trivy vulnerability scanner (CRITICAL)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_HUB_USERNAME }}/metrics-server-exporter:${{ env.RELEASE_VERSION }}
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL'
#      - name: Staticcheck is a state of the art linter for the Go programming language
#        uses: dominikh/staticcheck-action@v1.3.0
#        with:
#          version: "2023.1.6"

      # ── Helm Chart Release (only on tag push) ──
      - name: Update Helm chart version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG="${{ env.RELEASE_VERSION }}"
          CHART_DIR="helm-chart/metrics-server-exporter"

          # Update Chart.yaml version and appVersion with the tag
          sed -i "s/^version: .*/version: ${TAG}/" "${CHART_DIR}/Chart.yaml"
          sed -i "s/^appVersion: .*/appVersion: \"v${TAG}\"/" "${CHART_DIR}/Chart.yaml"

          echo "Updated Chart.yaml:"
          cat "${CHART_DIR}/Chart.yaml"

      - name: Install Helm
        if: startsWith(github.ref, 'refs/tags/')
        uses: azure/setup-helm@v4
        with:
          version: v3.17.3

      - name: Package Helm chart
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          helm package helm-chart/metrics-server-exporter -d helm-chart/

      - name: Update Helm repo index
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          helm repo index --url https://antiantiops.github.io/metrics-server-exporter/helm-chart/ --merge index.yaml helm-chart/
          mv helm-chart/index.yaml index.yaml

      - name: Commit and push Helm chart changes
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add helm-chart/ index.yaml
          git commit -m "chore: release helm chart v${{ env.RELEASE_VERSION }}"
          git push origin HEAD:master
