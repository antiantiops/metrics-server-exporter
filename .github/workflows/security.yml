name: betterleaks

on:
  pull_request:
  push:
  workflow_dispatch:
#  schedule:
#    - cron: "0 4 * * *" # run once a day at 4 AM

jobs:
  scan:
    name: betterleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install betterleaks
        run: |
          curl -sSL -o betterleaks.tar.gz https://github.com/betterleaks/betterleaks/releases/download/v1.2.0/betterleaks_1.2.0_linux_x64.tar.gz
          tar -xzf betterleaks.tar.gz
          sudo install -m 0755 betterleaks /usr/local/bin/betterleaks

      - name: Run betterleaks
        run: betterleaks git . -v --exit-code 1
